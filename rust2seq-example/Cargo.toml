[package]
name = "rust2seq-example"
version = "0.1.0"
edition = "2021"
description = "OAuth 2.0 Authorization Code + PKCE — a worked example of rust2seq annotations."
license = "MIT OR Apache-2.0"
publish = false

[dependencies]
# Pulls in the user-facing macros (#[seq::participant], #[seq::msg],
# #[seq::label], seq::diagram!). No build.rs needed — diagrams are
# regenerated by `cargo rust2seq`, not by `cargo build`.
rust2seq = { path = "../rust2seq" }
